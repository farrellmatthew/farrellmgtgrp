<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matt Farrell | EX</title>
    <meta
      name="description"
      content="Embedded artifact page for Matt Farrell."
    />
    <style>
      :root {
        --command-dark: #2c2c2a;
        --navigator-blue: #185fa5;
        --terrain: #f1efe8;
        --line-soft: rgba(44, 44, 42, 0.08);
        --shadow-soft: 0 24px 60px rgba(44, 44, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        font-family: "DM Sans", system-ui, sans-serif;
        color: var(--command-dark);
        background:
          radial-gradient(circle at top left, rgba(24, 95, 165, 0.08), transparent 24%),
          linear-gradient(180deg, #e9ece8 0%, var(--terrain) 100%);
      }

      .shell {
        width: min(1200px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 40px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      .title {
        margin: 0;
        font-size: clamp(1.5rem, 3vw, 2.25rem);
        line-height: 1;
        letter-spacing: -0.03em;
        font-family: Georgia, serif;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 12px 16px;
        background: var(--navigator-blue);
        color: #fff;
        text-decoration: none;
        font-size: 0.95rem;
      }

      .frame-wrap {
        overflow: hidden;
        border: 1px solid var(--line-soft);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: var(--shadow-soft);
      }

      iframe {
        display: block;
        width: 100%;
        height: calc(100vh - 140px);
        min-height: 720px;
        border: 0;
        background: #fff;
      }

      @media (max-width: 720px) {
        .topbar {
          flex-direction: column;
          align-items: flex-start;
        }

        iframe {
          height: calc(100vh - 180px);
          min-height: 560px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="topbar">
        <h1 class="title">Embedded Preview</h1>
        <a class="back-link" href="../">Back to main page</a>
      </div>

      <div class="frame-wrap">
        <iframe
          src="https://claude.site/public/artifacts/5c0dc83f-f986-4ad0-b3d3-7695fb6770a9/embed"
          title="Claude Artifact"
          width="100%"
          height="600"
          frameborder="0"
          allow="clipboard-write"
          allowfullscreen
        ></iframe>
      </div>
    </main>
  </body>
</html>
